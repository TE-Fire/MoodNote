# Spring Boot 主配置文件
# 包含应用基础配置、数据源、邮件、MyBatis-Plus、JWT 等配置

# ==================== Spring 基础配置 ====================
spring:
  # 应用名称，用于标识当前应用
  application:
    name: moodnote-server
  
  # ==================== 数据源配置 ====================
  # 配置 MySQL 数据库连接信息
  datasource:
    # 数据库连接 URL
    # jdbc:mysql://主机地址:端口/数据库名?参数
    # useUnicode=true: 使用 Unicode 字符集
    # characterEncoding=utf-8: 字符编码为 UTF-8
    # useSSL=false: 不使用 SSL 连接（开发环境）
    # serverTimezone=Asia/Shanghai: 时区设置为上海时间
    url: jdbc:mysql://localhost:3306/moodnote?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    # 数据库用户名
    username: root
    # 数据库密码（生产环境应使用环境变量或密钥管理）
    password: 123456
    # MySQL JDBC 驱动类（MySQL 8.0+ 使用 com.mysql.cj.jdbc.Driver）
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # ==================== Jackson JSON 配置 ====================
  # 配置 JSON 序列化和反序列化规则
  jackson:
    # 日期格式化格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区设置为上海时间
    time-zone: Asia/Shanghai
  
  # ==================== 邮件配置（QQ邮箱） ====================
  # 配置 SMTP 邮件发送服务，用于发送验证码等功能
  mail:
    # QQ邮箱 SMTP 服务器地址
    host: smtp.qq.com
    # SMTP 端口（587 为 TLS 端口，465 为 SSL 端口）
    port: 587
    # 发送邮件的 QQ 邮箱地址
    username: 3037749727@qq.com
    # QQ邮箱授权码（非密码，需在 QQ邮箱设置中开启 SMTP 并获取）
    password: zfnkfeorsgyadeeg
    # 邮件协议
    protocol: smtp
    # 邮件属性配置
    properties:
      mail:
        smtp:
          # 是否启用 SMTP 认证
          auth: true
          # 是否启用 STARTTLS（安全连接）
          starttls:
            enable: true

# ==================== MyBatis-Plus 配置 ====================
# MyBatis-Plus 是 MyBatis 的增强工具，提供 CRUD 等便捷功能
mybatis-plus:
  # Mapper XML 文件的扫描路径
  mapper-locations: classpath:mapper/**/*.xml
  # 实体类的包路径，用于自动扫描实体
  type-aliases-package: com.moodnote.pojo.entity
  # 全局配置
  global-config:
    db-config:
      # 主键生成策略：auto 表示使用数据库自增
      id-type: auto
      # 逻辑删除字段名（软删除标记字段）
      logic-delete-field: deleted
      # 逻辑删除值（表示已删除）
      logic-delete-value: 1
      # 逻辑未删除值（表示正常）
      logic-not-delete-value: 0

# ==================== 服务器配置 ====================
server:
  # 服务端口号
  port: 8080
  servlet:
    # 应用上下文路径（根路径）
    context-path: /

# ==================== Knife4j API 文档配置 ====================
# Knife4j 是 Swagger 的增强工具，用于生成 API 文档
knife4j:
  # 是否启用 Knife4j
  enable: true
  setting:
    # 文档语言：中文
    language: zh_cn

# ==================== JWT 配置 ====================
# JWT（JSON Web Token）用于无状态身份认证
jwt:
  # JWT 签名密钥（生产环境应使用安全的随机密钥）
  secret: moodnote-secret-key-2024
  # Token 过期时间（毫秒），86400000 表示 24 小时
  expiration: 86400000